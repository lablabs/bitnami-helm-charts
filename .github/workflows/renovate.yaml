name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: 0 4 * * *

permissions:
  contents: read

jobs:
  call-workflow:
    name: lara-tools
    uses: lablabs/lara-tools/.github/workflows/renovate.yml@f3e4d3bffe5df23aef697b95fed4624223fd58f9 # v1.0.0
    secrets:
      renovate-app-id: ${{ secrets.LARA_RENOVATE_APP_ID }}
      renovate-app-private-key: ${{ secrets.LARA_RENOVATE_APP_PRIVATE_KEY }}
